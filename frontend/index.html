<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Clínica Veterinaria - Acceso</title>
    <style>
        body { font-family: system-ui, sans-serif; background-color: #f3f4f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #1f2937; margin-top: 0; }
        label { display: block; margin: 10px 0 5px; color: #4b5563; font-weight: bold; }
        select, input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #d1d5db; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #2563eb; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        button:hover { background-color: #1d4ed8; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Acceso al Sistema</h2>
        <label>Rol del Usuario:</label>
        <select id="rolSelect" onchange="toggleVetId()">
            <option value="rol_admin">Administrador</option>
            <option value="rol_recepcion">Recepción</option>
            <option value="rol_veterinario">Veterinario</option>
        </select>
        
        <div id="vetIdDiv" style="display: none;">
            <label>ID de Veterinario:</label>
            <input type="number" id="vetIdInput" placeholder="Ej: 1">
        </div>

        <button onclick="ingresar()">Ingresar</button>
    </div>

    <script>
        function toggleVetId() {
            const rol = document.getElementById('rolSelect').value;
            document.getElementById('vetIdDiv').style.display = (rol === 'rol_veterinario') ? 'block' : 'none';
        }

        function ingresar() {
            const rol = document.getElementById('rolSelect').value;
            const vetId = document.getElementById('vetIdInput').value;
            localStorage.setItem('rol', rol);
            localStorage.setItem('vetId', vetId || '0');
            window.location.href = 'mascotas.html';
        }
    </script>
</body>
</html>
